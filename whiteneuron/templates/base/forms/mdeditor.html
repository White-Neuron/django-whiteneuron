<input type="hidden" name="{{ widget.name }}" id="mdeditor-hidden-{{ widget.name }}"{% if widget.value != None %} value="{{ widget.value }}"{% endif %}>

<div class="max-w-4xl mdeditor-container" data-mdeditor-target="mdeditor-hidden-{{ widget.name }}" data-md-preview-url="{% url 'md_preview' %}">
    <div class="border border-base-200 rounded-lg overflow-hidden bg-white dark:border-base-700 dark:bg-base-950 group-[.errors]:border-red-600">
        <!-- Header -->
        <div class="flex items-center justify-between px-4 py-2 bg-base-100 border-b border-base-200 dark:bg-base-900 dark:border-base-700">
            <span class="text-sm font-medium text-base-500 dark:text-base-300">Markdown</span>
            <button type="button" 
                    id="md-preview-btn-{{ widget.name }}"
                    class="mdeditor-toggle btn btn-xs btn-outline normal-case flex items-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed dark:border-base-700 dark:hover:bg-base-800 dark:text-base-300"
                    aria-label="Preview markdown">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-4 w-4 preview-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
                <span class="preview-text">Preview</span>
                <span class="loading loading-spinner loading-xs hidden preview-loading"></span>
            </button>
        </div>

        <!-- Editor -->
        <textarea 
            id="mdeditor-editor-{{ widget.name }}"
            data-mdeditor-editor
            rows="20"
            placeholder="Write your markdown here..."
            class="mdeditor-textarea p-4 w-full focus:outline-hidden resize-y bg-white dark:bg-base-950 font-mono text-sm leading-relaxed border border-base-200! border-t-0! group-[.errors]:border-red-600 placeholder:text-base-300 dark:placeholder:text-base-600"
            aria-label="Markdown editor"
        >{{ widget.value|default:'' }}</textarea>
    </div>
</div>
