{% load unfold %}

<div class="{% if field.errors %}errors {% endif %}flex flex-col gap-2 group mb-5 last:mb-4">
    {% include "unfold/helpers/form_label.html" with field=field %}

    <div class="flex items-center relative">
        {{ field }}
        <span class="material-symbols-outlined absolute right-2" onclick="togglePassword('id_password', this)" style="cursor: pointer;">visibility</span>
        <script>
            function togglePassword(fieldId, icon) {
                var field = document.getElementById(fieldId);
                if (field.type === "password") {
                    field.type = "text";
                    icon.textContent = "visibility_off"; // Change icon to 'hide'
                } else {
                    field.type = "password";
                    icon.textContent = "visibility"; // Change icon to 'show'
                }
            }
        </script>
    </div>

    {% include "unfold/helpers/form_errors.html" with errors=field.errors %}

    {% include "unfold/helpers/help_text.html" with help_text=field.help_text %}
</div>
